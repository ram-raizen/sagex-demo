<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#060C1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SageX - See the Difference (v2)</title>
<meta property="og:title" content="SageX - See the Difference">
<meta property="og:description" content="Tap through an interactive demo. See the mess in your documents - and watch SageX clean them in seconds.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060C1A;--card:#0D1424;--elev:#1A2236;
  --t1:#F1F5F9;--t2:#CBD5E1;--t3:#64748B;
  --blue:#60A5FA;--bb:#93C5FD;--green:#6EE7B7;--gb:#A7F3D0;
  --red:#FCA5A5;--amber:#FDE68A;--orange:#FDBA74;
  --gblue:rgba(96,165,250,.4);--ggreen:rgba(110,231,183,.4);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
body{
  font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--t1);
  background-image:radial-gradient(circle at 50% 0%,rgba(96,165,250,.07) 0%,transparent 50%),radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:100% 100%,22px 22px;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:calc(14px + var(--sat)) 16px calc(96px + var(--sab));
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
  touch-action:manipulation;overflow-x:hidden;overscroll-behavior-y:contain;
}
.grad{background:linear-gradient(135deg,var(--blue),#A78BFA,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.steps{display:flex;align-items:center;width:100%;max-width:380px;margin-bottom:20px}
.stp{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.stp-d{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.08);transition:all .4s}
.stp.on .stp-d{background:var(--blue);box-shadow:0 0 12px var(--gblue)}
.stp.done .stp-d{background:var(--green);box-shadow:0 0 10px var(--ggreen)}
.stp-l{font-size:11px;font-weight:700;color:var(--t3);transition:color .4s;white-space:nowrap}
.stp.on .stp-l{color:var(--t1)}
.stp.done .stp-l{color:var(--green)}
.stp-line{flex:1;height:2px;background:rgba(255,255,255,.06);margin:0 6px;min-width:16px;align-self:flex-start;margin-top:5px}

.ind{display:flex;gap:10px;width:100%;max-width:420px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px}
.ind::-webkit-scrollbar{display:none}
.ic{flex:1;min-width:112px;padding:16px 10px 14px;border-radius:18px;background:var(--card);border:1.5px solid rgba(255,255,255,.06);cursor:pointer;text-align:center;transition:all .3s}
.ic.on{border-color:var(--blue);background:rgba(96,165,250,.08);box-shadow:0 0 28px rgba(96,165,250,.15)}
.ic-i{font-size:24px;font-weight:800;color:var(--blue);margin-bottom:8px}
.ic-n{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.ic-h{font-size:10px;font-weight:500;color:var(--t3);line-height:1.35}

.vpc{width:100%;max-width:420px;border:1px solid rgba(96,165,250,.12);border-radius:28px;padding:28px 28px 32px;position:relative;background:var(--card);transition:border-color .6s,box-shadow .6s;box-shadow:0 8px 48px rgba(0,0,0,.5)}
.vpc.glow-r{border-color:rgba(252,165,165,.2);box-shadow:0 0 50px rgba(252,165,165,.07),0 8px 48px rgba(0,0,0,.5)}
.vpc.glow-b{border-color:rgba(96,165,250,.3);box-shadow:0 0 50px rgba(96,165,250,.1),0 8px 48px rgba(0,0,0,.5)}
.vpc.glow-g{border-color:rgba(110,231,183,.3);box-shadow:0 0 60px rgba(110,231,183,.1),0 8px 48px rgba(0,0,0,.5)}
.vpc-tag{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--card);padding:0 12px;margin-top:-9px;font-size:10px;font-weight:700;color:rgba(96,165,250,.35);letter-spacing:.05em;white-space:nowrap}
.flow{display:flex;flex-direction:column;align-items:center;padding-top:12px}

.bub{width:100%;max-width:340px;padding:16px 20px;background:var(--elev);border:1px solid rgba(255,255,255,.07);border-radius:16px;margin:10px 0;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.bub::after{content:'';position:absolute;bottom:-7px;left:50%;margin-left:-7px;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid var(--elev)}
.bub-t{font-size:15px;font-weight:600;color:var(--t1);line-height:1.55;min-height:22px}

.tdots{display:inline-flex;gap:4px;padding:2px 0}
.td{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:tdB .6s ease-in-out infinite}
.td:nth-child(2){animation-delay:.15s}
.td:nth-child(3){animation-delay:.3s}

.fcard{width:148px;min-height:132px;background:rgba(96,165,250,.06);border:1.5px solid rgba(96,165,250,.18);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;padding:20px 12px;transition:all .35s;box-shadow:0 4px 28px rgba(0,0,0,.3)}
.fcard .nm{font-size:13px;font-weight:700;text-align:center;line-height:1.3;color:var(--t1)}
.ocard{width:148px;min-height:132px;background:rgba(110,231,183,.06);border:1.5px solid rgba(110,231,183,.18);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;padding:20px 12px;transition:all .35s;box-shadow:0 4px 28px rgba(0,0,0,.3)}
.ocard .nm{font-size:13px;font-weight:700;text-align:center;color:var(--green)}

.glow-target{animation:glowP 2s ease-in-out infinite}
.shimmer{position:relative;overflow:hidden}
.shimmer::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.06) 50%,transparent 62%);background-size:250% 100%;animation:shimSweep .9s ease-out;pointer-events:none;border-radius:inherit}

.conn{width:2px;height:28px;margin:10px 0;background:rgba(255,255,255,.05);border-radius:1px}
.pw{width:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center}

.pc{border-radius:18px;overflow:hidden;width:100%;max-width:360px}
.pc.messy{border:1px solid rgba(252,165,165,.18);background:var(--elev)}
.ph{padding:16px 20px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800}
.pc.messy .ph{background:rgba(252,165,165,.06);color:var(--red)}
.pb{padding:16px 20px}
.dl{height:6px;border-radius:3px;margin-bottom:7px}
.dl.m{background:rgba(255,255,255,.07)}
.dl.m.prob{background:rgba(252,165,165,.1);border:1px solid rgba(252,165,165,.18)}
.ips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.ip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap}
.ip svg{flex-shrink:0}
.ip.w{background:rgba(253,230,138,.08);color:var(--amber);border:1px solid rgba(253,230,138,.2)}
.ip.e{background:rgba(252,165,165,.08);color:var(--red);border:1px solid rgba(252,165,165,.2)}
.ip.q{background:rgba(253,186,116,.08);color:var(--orange);border:1px solid rgba(253,186,116,.2)}
.pcount{font-size:15px;font-weight:800;margin:8px 0;text-align:center}

.cta{width:100%;max-width:360px;padding:18px 28px;margin:8px 0;background:var(--blue);color:#0F172A;border:none;border-radius:16px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;min-height:56px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s}
.cta:disabled{background:rgba(255,255,255,.04);color:var(--t3);cursor:default;box-shadow:none}
.cta:not(:disabled){box-shadow:0 0 32px var(--gblue),0 4px 16px rgba(0,0,0,.4)}
.cta:not(:disabled):active{transform:scale(.95)}

.sxw{position:relative;display:flex;flex-direction:column;align-items:center;padding:12px 0}
.sx{width:188px;height:76px;background:var(--elev);border-radius:22px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:all .4s;box-shadow:0 4px 32px rgba(0,0,0,.4)}
.sx.on{border-color:rgba(110,231,183,.35);box-shadow:0 0 48px var(--ggreen),0 0 90px rgba(110,231,183,.12)}
.sx svg{height:26px;width:auto;position:relative;z-index:2}
.sxf{position:absolute;bottom:0;left:0;right:0;height:0;background:linear-gradient(to top,rgba(110,231,183,.3),rgba(96,165,250,.1));z-index:1;border-radius:0 0 21px 21px}
.scan{position:absolute;inset:0;overflow:hidden;border-radius:21px;z-index:1}
.scan::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(110,231,183,.07),transparent);animation:scanln 1.6s ease-in-out infinite}
.orb{position:absolute;top:50%;left:50%;width:0;height:0}
.od{position:absolute;width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green),0 0 24px var(--ggreen);margin:-3.5px}
.od:nth-child(1){animation:orbA 2s linear infinite}
.od:nth-child(2){animation:orbA 2s linear infinite .67s}
.od:nth-child(3){animation:orbA 2s linear infinite 1.33s}

.pbar{width:188px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:12px}
.pbar .fill{height:100%;width:0;background:var(--green);border-radius:2px;box-shadow:0 0 10px var(--ggreen)}
.stg{width:100%;max-width:340px;padding:16px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;margin-top:14px;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.stg-h{font-size:16px;font-weight:700;color:var(--t1);line-height:1.4}
.stg-s{font-size:13px;font-weight:500;color:var(--t2);margin-top:4px;line-height:1.4}

.oz{width:148px;min-height:132px;border:1.5px dashed rgba(255,255,255,.06);border-radius:20px;display:flex;align-items:center;justify-content:center}

.ba{width:100%;max-width:360px;border-radius:18px;overflow:hidden;position:relative;display:flex;border:1px solid rgba(255,255,255,.08)}
.ba-side{flex:1;min-height:170px;padding:16px;position:relative;overflow:hidden}
.ba-bef{background:rgba(252,165,165,.04);border-right:1px solid rgba(255,255,255,.06)}
.ba-aft{background:rgba(110,231,183,.04)}
.ba-tag{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;padding:4px 12px;border-radius:12px;letter-spacing:.05em}
.ba-bef .ba-tag{background:rgba(252,165,165,.12);color:var(--red)}
.ba-aft .ba-tag{background:rgba(110,231,183,.12);color:var(--green)}
.ba-divider{position:absolute;top:0;bottom:0;left:50%;width:2px;background:rgba(255,255,255,.1);z-index:4}

.bp{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(110,231,183,.05);border:1px solid rgba(110,231,183,.18);border-radius:12px;font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px}
.ds{margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
.ds-h{font-size:16px;font-weight:800;margin-bottom:8px}
.ds-p{font-size:14px;font-weight:500;color:var(--t2);line-height:1.6}

.xdot{position:absolute;width:10px;height:10px;border-radius:50%;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none}
.xdot::after{content:'';position:absolute;width:4px;height:40px;bottom:100%;left:50%;transform:translateX(-50%);border-radius:2px;opacity:.65}
.xdot.blue{background:var(--bb);box-shadow:0 0 14px var(--blue),0 0 36px var(--gblue)}
.xdot.blue::after{background:linear-gradient(to bottom,transparent,var(--blue))}
.xdot.green{background:var(--gb);box-shadow:0 0 14px var(--green),0 0 36px var(--ggreen)}
.xdot.green::after{background:linear-gradient(to bottom,transparent,var(--green))}

.nxt{position:fixed;bottom:calc(20px + var(--sab));left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:420px;padding:18px 28px;background:linear-gradient(135deg,#60A5FA,#818CF8);color:#0F172A;border:none;border-radius:18px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;min-height:56px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 32px rgba(96,165,250,.25),0 8px 24px rgba(0,0,0,.4);z-index:50;transition:all .3s}
.nxt:active{transform:translateX(-50%) scale(.96)}
.nxt.glow{animation:nxtGlow 2.5s ease-in-out infinite}

.ptc{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:200;animation:ptcFly .7s ease-out forwards}

@keyframes tdB{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes glowP{0%,100%{box-shadow:0 0 12px var(--gblue),0 4px 28px rgba(0,0,0,.3)}50%{box-shadow:0 0 28px var(--gblue),0 0 56px rgba(96,165,250,.12),0 4px 28px rgba(0,0,0,.3)}}
@keyframes shimSweep{0%{background-position:250% 0}100%{background-position:-250% 0}}
@keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(96,165,250,.18),0 4px 28px rgba(0,0,0,.3)}50%{box-shadow:0 0 0 18px rgba(96,165,250,0),0 4px 28px rgba(0,0,0,.3)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
@keyframes orbA{0%{transform:rotate(0deg) translateX(68px) rotate(0deg);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:rotate(360deg) translateX(68px) rotate(-360deg);opacity:0}}
@keyframes scanln{0%{left:-100%}100%{left:100%}}
@keyframes nxtGlow{0%,100%{box-shadow:0 0 24px rgba(96,165,250,.25),0 8px 24px rgba(0,0,0,.4)}50%{box-shadow:0 0 44px rgba(96,165,250,.4),0 8px 24px rgba(0,0,0,.4)}}
@keyframes ptcFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
</style>
</head>

<div class="steps" id="steps">
  <div class="stp on" data-n="1"><div class="stp-d"></div><div class="stp-l">See it</div></div>

  <div class="stp" data-n="2"><div class="stp-d"></div><div class="stp-l">Clean it</div></div>
  <div class="stp-line"></div>
  <div class="stp" data-n="3"><div class="stp-d"></div><div class="stp-l">Result</div></div>

    <button class="cta" id="cta" disabled>Scanning...</button>
    <div class="conn"></div>
    <div class="sxw" id="sxw">
      <div class="sx" id="sx">

      </div>
      <div class="orb" id="orb" style="display:none"><div class="od"></div><div class="od"></div><div class="od"></div></div>
    </div>
    <div class="pbar" id="pbar" style="opacity:0"><div class="fill" id="pfill"></div></div>
    <div class="stg" id="stg" style="opacity:0"><div class="stg-h" id="stgH"></div><div class="stg-s" id="stgS"></div></div>
    <div class="conn"></div>
    <div class="oz" id="oz">
      <div class="ocard" id="out" style="opacity:0;transform:scale(0)">
        <svg viewBox="0 0 36 36" width="48" height="48"><circle cx="18" cy="18" r="16" fill="none" stroke="rgba(110,231,183,.1)" stroke-width="2"/><circle id="ckC" cx="18" cy="18" r="16" fill="none" stroke="var(--green)" stroke-width="2" stroke-dasharray="100" stroke-dashoffset="100"/><path id="ckP" d="M11 18l5 5 9-9" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="28" stroke-dashoffset="28"/></svg>
        <div class="nm" id="oNm">Cleaned</div>
      </div>
    </div>
    <div class="bub" id="bub3" style="display:none"><div class="bub-t" id="bub3T"></div></div>
    <div id="baW" class="pw" style="display:none">
      <div class="conn"></div>
      <div class="ba" id="ba">
        <div class="ba-side ba-bef" id="baBef"><div class="ba-tag">BEFORE</div></div>
        <div class="ba-divider"></div>
        <div class="ba-side ba-aft" id="baAft"><div class="ba-tag">AFTER</div></div>
      </div>
      <div id="bdgW" style="margin-top:16px;width:100%;max-width:360px"></div>
      <div class="ds" id="dsW" style="opacity:0;width:100%;max-width:360px"><div class="ds-h grad">Now your AI tools can actually work</div><div class="ds-p" id="dsP"></div></div>
    </div>
  </div>
  <div class="xdot" id="xdot" style="display:none"></div>
</div>

<button class="nxt" id="nxt" style="display:none">Next</button>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
<script>
var IC={
  warn:'<svg viewBox="0 0 14 14" width="13" height="13"><path d="M7 1.5L12.5 12H1.5z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="7" y1="6" x2="7" y2="8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="10.2" r=".6" fill="currentColor"/></svg>',
  err:'<svg viewBox="0 0 14 14" width="13" height="13"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M5 5l4 4M9 5l-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>',
  quest:'<svg viewBox="0 0 14 14" width="13" height="13"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 5.5a1.8 1.8 0 013 1.3c0 1-1.5 1.2-1.5 2.2" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="10.8" r=".5" fill="currentColor"/></svg>',
  check:'<svg viewBox="0 0 20 20" width="18" height="18"><circle cx="10" cy="10" r="9" fill="var(--green)"/><path d="M6 10l3 3 5-5" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};
var ARROW='<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>';
function docSvg(s){return '<svg viewBox="0 0 48 60" width="48" height="60"><rect x="1" y="1" width="46" height="58" rx="6" fill="rgba(96,165,250,.07)" stroke="rgba(96,165,250,.22)" stroke-width="1.2"/><polygon points="32,1 47,16 32,16" fill="rgba(96,165,250,.1)" stroke="rgba(96,165,250,.18)" stroke-width=".8"/><text x="24" y="44" text-anchor="middle" fill="rgba(96,165,250,.5)" font-size="20" font-weight="800" font-family="Manrope,sans-serif">'+s+'</text></svg>'}
var PIC={w:IC.warn,e:IC.err,q:IC.quest};

var STAGES=[
  {h:'Identifying document type...',s:'Works on any format - built on content, not templates'},
  {h:'Creating data schema...',s:'Your data never leaves your cloud perimeter'},
  {h:'Extracting every field...',s:'Page, section, table, cell - all traceable'},
  {h:'Verifying and tracing sources...',s:'Every extraction auditable to its source'}
];

var DATA={
  'financial-services':{
    pill:'Financial Services',sym:'$',doc:'ESG Compliance Report',
    hook:'200-page ESG reports',
    intro:'Your 200-page ESG report just arrived. Your team has to review every table, every field, every number.',
    issues:[{t:'Broken Tables',c:'e'},{t:'Missing Fields',c:'e'},{t:"Columns Don't Line Up",c:'w'},{t:'Looks Different Every Page',c:'q'},{t:'200+ Pages of Chaos',c:'e'}],
    badges:['Compliance Verified','ESG Data Pulled Out','Every Change Tracked'],
    done:'Compliance-ready in 2 hours instead of 2 months.',
    ds:'Feed into your compliance engine, RAG pipeline, or audit system. Every field traced to its source.'
  },
  manufacturing:{
    pill:'Manufacturing',sym:'\u2261',doc:'Supplier Invoice (Scan)',
    hook:'Scanned invoices at scale',
    intro:'A stack of scanned invoices from 12 suppliers. Your AP team has to match every line item.',
    issues:[{t:'Poor Scan Quality',c:'e'},{t:'Mismatched Line Items',c:'w'},{t:"Numbers Don't Add Up",c:'e'},{t:"Can't Find the PO Number",c:'q'},{t:'Text Too Blurry to Read',c:'w'}],
    badges:['Line Items Matched','PO Numbers Matched','$2/doc'],
    done:'Every line item matched. $2 per document instead of $20.',
    ds:'Push to your ERP or AP automation. Every line item matched and verified.'
  },
  healthcare:{
    pill:'Healthcare',sym:'+',doc:'Insurance Claim Form',
    hook:'Handwritten claim forms',
    intro:'Insurance claims are pouring in. Handwritten fields, faded scans, stamps over data.',
    issues:[{t:"Can't Tell What's Checked",c:'q'},{t:'Handwritten Fields',c:'w'},{t:'Stamps Over Data',c:'e'},{t:'Missing Medical Codes',c:'e'},{t:'Text Too Faded to Read',c:'w'}],
    badges:['HIPAA Compliant','Claims Structured','Medical Codes Found'],
    done:'Every medical code found. Minutes instead of days.',
    ds:'Route to your claims engine or coding system. Every field resolved and tagged.'
  }
};
var KEYS=Object.keys(DATA);

var step=-1,industry,timers=[],atl=null,twIv=null;

var src=document.getElementById('src'),srcIco=document.getElementById('srcIco'),srcNm=document.getElementById('srcNm'),
    mW=document.getElementById('mW'),mC=document.getElementById('mC'),
    pcount=document.getElementById('pcount'),pcountN=document.getElementById('pcountN'),
    bub1=document.getElementById('bub1'),bub1T=document.getElementById('bub1T'),
    bub2=document.getElementById('bub2'),bub2T=document.getElementById('bub2T'),
    bub3=document.getElementById('bub3'),bub3T=document.getElementById('bub3T'),
    cta=document.getElementById('cta'),sx=document.getElementById('sx'),sxf=document.getElementById('sxf'),
    scanEl=document.getElementById('scanEl'),sxw=document.getElementById('sxw'),orb=document.getElementById('orb'),
    vpc=document.getElementById('vpc'),pbar=document.getElementById('pbar'),pfill=document.getElementById('pfill'),
    stg=document.getElementById('stg'),stgH=document.getElementById('stgH'),stgS=document.getElementById('stgS'),
    oz=document.getElementById('oz'),out=document.getElementById('out'),oNm=document.getElementById('oNm'),
    ckC=document.getElementById('ckC'),ckP=document.getElementById('ckP'),
    baW=document.getElementById('baW'),baBef=document.getElementById('baBef'),baAft=document.getElementById('baAft'),
    bdgW=document.getElementById('bdgW'),dsW=document.getElementById('dsW'),dsP=document.getElementById('dsP'),
    xdot=document.getElementById('xdot'),nxt=document.getElementById('nxt'),
    indCards=document.getElementById('indCards'),stepsEl=document.getElementById('steps');

function later(fn,ms){var t=setTimeout(fn,ms);timers.push(t);return t}
function clr(){timers.forEach(clearTimeout);timers=[];if(atl){atl.kill();atl=null}if(twIv){clearInterval(twIv);twIv=null}}

function setStep(n){stepsEl.querySelectorAll('.stp').forEach(function(s){var sn=+s.dataset.n;s.classList.toggle('on',sn===n);s.classList.toggle('done',sn<n)})}

function showNxt(text){nxt.innerHTML=text+' '+ARROW;nxt.style.display='flex';nxt.classList.add('glow');gsap.fromTo(nxt,{opacity:0,y:10},{opacity:1,y:0,duration:.35,ease:'back.out(1.5)'})}
function hideNxt(){nxt.style.display='none';nxt.classList.remove('glow')}

function typewrite(el,text,cb){
  el.textContent='';var i=0;
  twIv=setInterval(function(){el.textContent+=text[i];i++;if(i>=text.length){clearInterval(twIv);twIv=null;if(cb)cb()}},22);
}
function showBubTyping(n,text,cb){
  var b=n===1?bub1:n===2?bub2:bub3;var t=n===1?bub1T:n===2?bub2T:bub3T;
  t.innerHTML='<span class="tdots"><span class="td"></span><span class="td"></span><span class="td"></span></span>';
  b.style.display='block';gsap.fromTo(b,{opacity:0,y:8},{opacity:1,y:0,duration:.35,ease:'back.out(1.5)'});
  later(function(){typewrite(t,text,cb)},650);
}
function hideBubs(){[bub1,bub2,bub3].forEach(function(b){b.style.display='none';gsap.set(b,{opacity:0})})}

function shimmer(el){el.classList.add('shimmer');setTimeout(function(){el.classList.remove('shimmer')},950)}

function burst(el,color,count){
  var r=el.getBoundingClientRect();
  for(var i=0;i<count;i++){
    var p=document.createElement('span');p.className='ptc';p.style.background=color;
    p.style.left=r.left+r.width/2+'px';p.style.top=r.top+r.height/2+'px';
    var a=Math.random()*Math.PI*2,d=30+Math.random()*50;
    p.style.setProperty('--tx',Math.cos(a)*d+'px');p.style.setProperty('--ty',Math.sin(a)*d+'px');
    p.style.width=(4+Math.random()*4)+'px';p.style.height=p.style.width;
    document.body.appendChild(p);setTimeout(function(){p.remove()},750);
  }
}

function showStage(i){
  gsap.to(stg,{opacity:0,y:-8,duration:.2,onComplete:function(){
    stgH.textContent=STAGES[i].h;stgS.textContent=STAGES[i].s;
    gsap.fromTo(stg,{opacity:0,y:12},{opacity:1,y:0,duration:.4,ease:'back.out(1.5)'});
  }});
}

function renderMessy(d){
  var W=[88,60,80,45,72,38,55,68],O=[0,10,-3,14,4,18,0,12],R=[0,0,.8,-.5,0,1,-.6,0];
  var h='<div class="ph">'+IC.err+' <span>'+d.doc+'</span></div><div class="pb">',pi=0,li=0;
  for(var r=0;r<14;r++){
    if(r%3===2&&pi<d.issues.length){
      var prob=r%6===2;
      if(prob&&li<W.length){h+='<div class="dl m prob" style="width:'+W[li]+'%;margin-left:'+O[li]+'%;transform:rotate('+R[li]+'deg)"></div>';li++}
      h+='<div class="ips"><span class="ip '+d.issues[pi].c+'">'+PIC[d.issues[pi].c]+' '+d.issues[pi].t+'</span>';pi++;
      if(pi<d.issues.length){h+='<span class="ip '+d.issues[pi].c+'">'+PIC[d.issues[pi].c]+' '+d.issues[pi].t+'</span>';pi++}
      h+='</div>';
    }else if(li<W.length){h+='<div class="dl m" style="width:'+W[li]+'%;margin-left:'+O[li]+'%;transform:rotate('+R[li]+'deg)"></div>';li++}
  }
  h+='</div>';mC.innerHTML=h;
}
function renderBefore(d){
  var h='';for(var i=0;i<4;i++)h+='<div class="dl m" style="width:'+(50+Math.random()*40)+'%;margin-top:28px;transform:rotate('+(Math.random()*1.5-.75)+'deg)"></div>';
  h+='<div style="margin-top:8px"><span class="ip e" style="font-size:10px">'+d.issues.length+' issues</span></div>';
  baBef.innerHTML='<div class="ba-tag">BEFORE</div><div style="padding:34px 12px 12px">'+h+'</div>';
}
function renderAfter(d){
  var h='';for(var i=0;i<4;i++)h+='<div class="dl" style="background:rgba(255,255,255,.06);width:90%;margin-top:28px;height:6px;border-radius:3px"></div>';
  h+='<div style="margin-top:8px">'+IC.check+' <span style="font-size:10px;color:var(--green);font-weight:700">Clean</span></div>';
  baAft.innerHTML='<div class="ba-tag">AFTER</div><div style="padding:34px 12px 12px">'+h+'</div>';
}
function renderBadges(d){var h='';d.badges.forEach(function(b){h+='<div class="bp">'+IC.check+' '+b+'</div>'});bdgW.innerHTML=h}

function setContent(){
  var d=DATA[industry];
  srcIco.innerHTML=docSvg(d.sym);srcNm.textContent=d.doc;oNm.textContent='Cleaned';
  renderMessy(d);renderBefore(d);renderAfter(d);renderBadges(d);dsP.textContent=d.ds;
}

function resetAll(){
  clr();hideNxt();hideBubs();step=-1;
  gsap.killTweensOf([src,cta,sx,sxf,out,mW,baW,pbar,pfill,stg,xdot,ckC,ckP,pcount,dsW]);
  gsap.set(src,{scale:1,opacity:1,height:'auto',marginBottom:'',y:0});
  gsap.set(out,{scale:0,opacity:0});gsap.set([pbar,stg,pcount,dsW],{opacity:0});
  gsap.set(pfill,{width:'0%'});gsap.set(sxf,{height:0});
  gsap.set(ckC,{strokeDashoffset:100});gsap.set(ckP,{strokeDashoffset:28});
  gsap.set(baAft,{clipPath:'inset(0 0% 0 0)'});gsap.set(sx,{scale:1});
  src.classList.remove('glow-target','shimmer');src.style.animation='';
  sx.classList.remove('on');vpc.className='vpc';
  orb.style.display='none';scanEl.style.display='none';
  cta.disabled=true;cta.textContent='Scanning...';cta.classList.remove('glow-target');
  xdot.style.display='none';mW.style.display='none';mW.style.height='';mW.style.opacity='';
  baW.style.display='none';baW.style.height='';out.classList.remove('glow-target');
  pcountN.textContent='0';setStep(1);
}

var SUBS=[
  function s0(){
    setContent();setStep(1);hideNxt();
    var d=DATA[industry];
    showBubTyping(1,d.intro+' Tap to see what\'s inside.',function(){showNxt('Next')});
    window.scrollTo({top:0,behavior:'smooth'});
  },
  function s1(){
    hideNxt();
    src.classList.add('glow-target');src.style.animation='gpulse 2.5s ease-in-out infinite';
    shimmer(src);
    showNxt('Tap the document');
  },
  function s2(){
    hideNxt();hideBubs();
    src.classList.remove('glow-target');src.style.animation='';
    gsap.to(src,{scale:.88,duration:.35,ease:'power2.out'});
    vpc.className='vpc glow-r';
    mW.style.display='flex';
    gsap.from(mW,{height:0,duration:.6,ease:'power2.out',onComplete:function(){
      mW.style.height='auto';
      later(function(){burst(mC,getComputedStyle(document.documentElement).getPropertyValue('--red').trim(),10);mC.style.animation='shake .6s ease-in-out';later(function(){mC.style.animation=''},700)},200);
    }});
    later(function(){
      var pills=mC.querySelectorAll('.ip');
      gsap.from(pills,{opacity:0,y:12,stagger:.3,duration:.45,ease:'back.out(1.7)',
        onUpdate:function(){var done=0;pills.forEach(function(p){if(parseFloat(gsap.getProperty(p,'opacity'))>.5)done++});pcountN.textContent=done}
      });
      gsap.to(pcount,{opacity:1,duration:.3,delay:.1});
    },500);
    later(function(){showNxt('Next');cta.scrollIntoView({behavior:'smooth',block:'nearest'})},2200);
  },
  function s3(){
    hideNxt();
    var d=DATA[industry];
    showBubTyping(2,d.issues.length+' problems found. This is what slows your team down every single day.',function(){
      cta.innerHTML='Fix it with SageX '+ARROW;cta.disabled=false;
      cta.classList.add('glow-target');shimmer(cta);
      showNxt('Clean with SageX');
    });
  },
  function s4(){
    hideNxt();hideBubs();cta.disabled=true;cta.classList.remove('glow-target');
    setStep(2);vpc.className='vpc glow-b';
    gsap.to(pcount,{opacity:0,duration:.2});
    gsap.to(mW,{height:0,opacity:0,duration:.4,ease:'power2.in',onComplete:function(){
      mW.style.display='none';mW.style.height='';mW.style.opacity='';
      var vr=vpc.getBoundingClientRect(),sr=src.getBoundingClientRect(),sxr=sx.getBoundingClientRect();
      var y1=sr.top+sr.height/2-vr.top,y2=sxr.top+sxr.height/2-vr.top;
      atl=gsap.timeline();
      atl.to(src,{scale:0,opacity:0,duration:.6,ease:'power2.in'})
        .call(function(){xdot.style.display='block';xdot.className='xdot blue';gsap.set(xdot,{top:y1});burst(src,getComputedStyle(document.documentElement).getPropertyValue('--blue').trim(),8)},[],'<.2')
        .to(xdot,{top:y2,duration:.8,ease:'power2.inOut'},'<.1')
        .to(src,{height:0,marginBottom:0,duration:.25})
        .call(function(){xdot.style.display='none'})
        .to(sxf,{height:'100%',duration:.7,ease:'power2.out'})
        .call(function(){sx.classList.add('on');vpc.className='vpc glow-g';orb.style.display='block';scanEl.style.display='block';gsap.to(sx,{scale:1.08,duration:.5,ease:'power2.out'})})
        .to(pbar,{opacity:1,duration:.2})
        .to(pfill,{width:'100%',duration:10,ease:'none'})
        .call(function(){showStage(0)},[],'-=10')
        .call(function(){showStage(1)},[],'-=7.5')
        .call(function(){showStage(2)},[],'-=5')
        .call(function(){showStage(3)},[],'-=2.5')
        .call(function(){gsap.to(stg,{opacity:0,y:-8,duration:.3});orb.style.display='none';scanEl.style.display='none';gsap.to(sx,{scale:1,duration:.3})})
        .to(pbar,{opacity:0,duration:.35})
        .to(sxf,{height:0,duration:.35},'<')
        .call(function(){sx.classList.remove('on')})
        .call(function(){
          var vr2=vpc.getBoundingClientRect(),sxr2=sx.getBoundingClientRect(),ozr=oz.getBoundingClientRect();
          var gy1=sxr2.top+sxr2.height/2-vr2.top,gy2=ozr.top+ozr.height/2-vr2.top;
          xdot.style.display='block';xdot.className='xdot green';gsap.set(xdot,{top:gy1});
          gsap.to(xdot,{top:gy2,duration:.8,ease:'power2.inOut',onComplete:function(){
            xdot.style.display='none';burst(oz,getComputedStyle(document.documentElement).getPropertyValue('--green').trim(),12);
            advance();
          }});
        });
      later(function(){sxw.scrollIntoView({behavior:'smooth',block:'center'})},700);
    }});
  },
  function s5(){
    setStep(3);vpc.className='vpc glow-g';
    gsap.to(out,{scale:1,opacity:1,duration:.7,ease:'back.out(1.7)'},);
    shimmer(out);
    later(function(){gsap.to(ckC,{strokeDashoffset:0,duration:1,ease:'power2.out'});gsap.to(ckP,{strokeDashoffset:0,duration:.6,delay:.5,ease:'power2.out'})},300);
    later(function(){
      var d=DATA[industry];
      showBubTyping(3,'Done. '+d.done,function(){showNxt('See the result')});
      out.scrollIntoView({behavior:'smooth',block:'nearest'});
    },900);
  },
  function s6(){
    hideNxt();hideBubs();
    baW.style.display='flex';gsap.set(baAft,{clipPath:'inset(0 100% 0 0)'});
    gsap.from(baW,{height:0,duration:.6,ease:'power2.out',onComplete:function(){baW.style.height='auto'}});
    later(function(){gsap.to(baAft,{clipPath:'inset(0 0% 0 0)',duration:1.2,ease:'power2.inOut'})},500);
    later(function(){
      gsap.from(bdgW.querySelectorAll('.bp'),{opacity:0,x:-14,stagger:.35,duration:.5,ease:'back.out(1.7)'});
      burst(baAft,getComputedStyle(document.documentElement).getPropertyValue('--green').trim(),8);
    },800);
    later(function(){showNxt('Next')},2000);
  },
  function s7(){
    hideNxt();setStep(4);
    gsap.to(dsW,{opacity:1,duration:.5});
    later(function(){showNxt('Try another industry');dsW.scrollIntoView({behavior:'smooth',block:'nearest'})},800);
  }
];

function advance(){step++;if(step<SUBS.length)SUBS[step]()}
function startDemo(){resetAll();advance()}

nxt.addEventListener('click',function(){
  if(step===7){
    industry=KEYS[(KEYS.indexOf(industry)+1)%KEYS.length];
    indCards.querySelectorAll('.ic').forEach(function(c){c.classList.toggle('on',c.dataset.k===industry)});
    startDemo();return;
  }
  advance();
});
src.addEventListener('click',function(){if(step===1)advance()});
cta.addEventListener('click',function(){if(step===3&&!cta.disabled)advance()});
out.addEventListener('click',function(){if(step===5)advance()});

KEYS.forEach(function(k){
  var d=DATA[k],c=document.createElement('div');c.className='ic';c.dataset.k=k;
  c.innerHTML='<div class="ic-i">'+d.sym+'</div><div class="ic-n">'+d.pill+'</div><div class="ic-h">'+d.hook+'</div>';
  c.addEventListener('click',function(){
    if(k===industry&&step<=0)return;
    industry=k;indCards.querySelectorAll('.ic').forEach(function(x){x.classList.toggle('on',x.dataset.k===k)});
    startDemo();
  });
  indCards.appendChild(c);
});

industry=KEYS[0];indCards.querySelector('.ic').classList.add('on');startDemo();
</script>
</body>
</html>
